<!-- ur-summary: پشتون پٹی میں نقل مکانی کے اعداد و شمار کا ایک جاری حساب، جس میں متنازع اعداد کو نشان زد کیا گیا ہے۔ -->
<p>اس صفحے کو پشتون پٹی میں نقل مکانی کے اعداد و شمار کا حساب رکھنے کے لیے استعمال کریں، جو سرکاری اور انسانی ہمدردی کے ذرائع سے لیے گئے ہیں۔ ہر عدد اپنے ماخذ اور تاریخ کے ساتھ بیان کیا جاتا ہے۔ جہاں کوئی عدد متنازع ہو، اسے طے شدہ کے طور پر پیش کرنے کے بجائے اسی جملے میں واضح کر دیا جاتا ہے۔</p>
