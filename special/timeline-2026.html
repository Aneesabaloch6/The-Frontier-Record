<!-- title: Documentation Timeline 2026 -->
<!--
  This is a "special" hand-crafted HTML piece. Drop any standalone HTML here
  (custom timelines, interactive maps, data visualisations) and the build wraps
  it in the site header/footer automatically. Inline <style> is scoped-ish by
  prefixing your own classes. You have full control of this block.
-->
<style>
  .tl { list-style: none; margin: 2rem auto; padding: 0; max-width: 40rem; }
  .tl li { border-left: 2px solid var(--accent); padding: 0 0 1.6rem 1.4rem; position: relative; }
  .tl li::before { content: ""; position: absolute; left: -7px; top: .35rem; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; }
  .tl time { font-family: var(--mono); font-size: .75rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; }
  .tl h3 { margin: .25rem 0 .3rem; font-family: var(--serif); font-size: 1.25rem; }
  .tl p { margin: 0; color: var(--ink-soft); }
</style>

<ul class="tl">
  <li>
    <time>1 June 2026</time>
    <h3>Documentation note published</h3>
    <p>First standing record opened. Edit this file to build your own timeline.</p>
  </li>
  <li>
    <time>20 May 2026</time>
    <h3>Displacement tracking begins</h3>
    <p>Replace these entries with sourced events.</p>
  </li>
</ul>
